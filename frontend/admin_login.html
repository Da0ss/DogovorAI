<!DOCTYPE html>
<html lang="ru">
<head>

  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DogovorAI — Вход в админ-панель</title>
  <meta name="robots" content="noindex, nofollow">
  <link href="https://fonts.googleapis.com" rel="preconnect">
  <link crossorigin href="https://fonts.gstatic.com" rel="preconnect">
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Work+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Work Sans', sans-serif;
      position: relative;
      overflow: hidden;
    }

    /* Subtle grid pattern */
    body::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: radial-gradient(circle at 1px 1px, rgba(99, 102, 241, 0.12) 1px, transparent 0);
      background-size: 40px 40px;
      pointer-events: none;
    }

    /* Floating glow orbs */
    body::after {
      content: '';
      position: absolute;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(99, 102, 241, 0.15), transparent 70%);
      top: -150px;
      right: -100px;
      border-radius: 50%;
      pointer-events: none;
    }

    .login-container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      padding: 20px;
    }

    .login-card {
      background: rgba(30, 41, 59, 0.85);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 24px;
      padding: 40px 36px;
      box-shadow:
        0 25px 60px rgba(0, 0, 0, 0.4),
        0 0 80px rgba(99, 102, 241, 0.08);
    }

    .logo {
      text-align: center;
      margin-bottom: 32px;
    }

    .icon-wrap {
      width: 64px;
      height: 64px;
      border-radius: 18px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
      box-shadow: 0 8px 24px rgba(99, 102, 241, 0.35);
    }

    .icon-wrap .material-symbols-outlined {
      font-size: 32px;
      color: #fff;
    }

    .logo h1 {
      font-family: 'Manrope', sans-serif;
      font-size: 24px;
      font-weight: 800;
      color: #fff;
      margin-bottom: 4px;
    }

    .logo p {
      font-size: 14px;
      color: #94a3b8;
    }

    .input-group {
      margin-bottom: 20px;
    }

    .input-group label {
      display: block;
      font-family: 'Manrope', sans-serif;
      font-size: 12px;
      font-weight: 600;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 8px;
    }

    .input-group .input-wrap {
      position: relative;
    }

    .input-group .input-wrap .material-symbols-outlined {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 20px;
      color: #475569;
      pointer-events: none;
      transition: color 0.2s;
    }

    .input-group input {
      width: 100%;
      padding: 13px 16px 13px 46px;
      background: rgba(15, 23, 42, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      color: #e2e8f0;
      font-family: 'Work Sans', sans-serif;
      font-size: 15px;
      outline: none;
      transition: all 0.3s;
    }

    .input-group input::placeholder { color: #475569; }

    .input-group input:focus {
      border-color: #6366f1;
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
    }

    .input-group input:focus ~ .material-symbols-outlined,
    .input-group input:focus + .material-symbols-outlined {
      color: #818cf8;
    }

    .error-message {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.2);
      border-radius: 10px;
      padding: 12px 16px;
      color: #f87171;
      font-size: 13px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
      animation: shake 0.4s ease;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%, 60% { transform: translateX(-4px); }
      40%, 80% { transform: translateX(4px); }
    }

    .submit-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-family: 'Manrope', sans-serif;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 4px;
    }

    .submit-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 25px rgba(99, 102, 241, 0.4);
    }

    .submit-btn:active { transform: translateY(0); }
    .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; box-shadow: none; }

    .back-link {
      text-align: center;
      margin-top: 24px;
    }

    .back-link a {
      color: #64748b;
      font-size: 13px;
      text-decoration: none;
      transition: color 0.2s;
    }

    .back-link a:hover { color: #a5b4fc; }

    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      display: inline-block;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
  
  <!-- Vercel Web Analytics -->
  <script defer src="https://cdn.vercel-insights.com/v1/script.js"></script>
  
  <!-- Vercel Speed Insights -->
  <script type="module" src="/static/js/speed-insights.js"></script>
</head>

<body>

  <div class="login-container">
    <div class="login-card">
      <div class="logo">
        <div class="icon-wrap">
          <span class="material-symbols-outlined">admin_panel_settings</span>
        </div>
        <h1>DogovorAI</h1>
        <p>Административная панель</p>
      </div>

      <form id="loginForm" autocomplete="off">
        <div class="input-group">
          <label for="username">Имя пользователя</label>
          <div class="input-wrap">
            <input type="text" id="username" placeholder="Введите логин" required autocomplete="username">
            <span class="material-symbols-outlined">person</span>
          </div>
        </div>

        <div class="input-group">
          <label for="password">Пароль</label>
          <div class="input-wrap">
            <input type="password" id="password" placeholder="Введите пароль" required autocomplete="current-password">
            <span class="material-symbols-outlined">lock</span>
          </div>
        </div>

        <div id="errorMsg" class="error-message" style="display: none;">
          <span class="material-symbols-outlined" style="font-size: 18px;">error</span>
          <span id="errorText"></span>
        </div>

        <button type="submit" class="submit-btn" id="submitBtn">
          <span class="material-symbols-outlined" style="font-size: 20px;">login</span>
          Войти в панель
        </button>
      </form>

      <div class="back-link">
        <a href="/app">← Вернуться на сайт</a>
      </div>
    </div>
  </div>

  <script src="/static/js/analytics_helper.js?v=1.3"></script>
  <script>
    const form = document.getElementById('loginForm');
    const errorDiv = document.getElementById('errorMsg');
    const errorText = document.getElementById('errorText');
    const submitBtn = document.getElementById('submitBtn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      if (!username || !password) { showError('Заполните все поля'); return; }

      submitBtn.disabled = true;
      submitBtn.innerHTML = '<div class="spinner"></div> Вход...';
      errorDiv.style.display = 'none';

      try {
        const resp = await fetch('/admin-portal/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
        });

        const data = await resp.json();

        if (resp.ok && data.success) {
          submitBtn.innerHTML = '<span class="material-symbols-outlined" style="font-size:20px">check_circle</span> Успешно!';
          submitBtn.style.background = '#16a34a';
          setTimeout(() => { window.location.href = '/admin-portal/dashboard'; }, 400);
        } else {
          showError(data.detail || 'Неверные учётные данные');
          resetBtn();
        }
      } catch (err) {
        showError('Ошибка соединения. Попробуйте позже.');
        resetBtn();
      }
    });

    function showError(msg) {
      errorText.textContent = msg;
      errorDiv.style.display = 'flex';
    }

    function resetBtn() {
      submitBtn.disabled = false;
      submitBtn.style.background = '';
      submitBtn.innerHTML = '<span class="material-symbols-outlined" style="font-size:20px">login</span> Войти в панель';
    }

    // Auto-redirect if already authenticated
    fetch('/admin-portal/api/check-auth')
      .then(r => { if (r.ok) window.location.href = '/admin-portal/dashboard'; })
      .catch(() => {});
  </script>
</body>
</html>

<!DOCTYPE html>
<html class="dark" lang="ru">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>DogovorAI — Вход</title>
  <meta name="description" content="Войдите в DogovorAI — AI-сервис для анализа договоров">
  
  <!-- Material Symbols and Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&amp;family=Work+Sans:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
  
  <!-- Tailwind CSS -->
  <link rel="stylesheet" href="/static/css/tailwind-built.css?v=1.3">

  <style>
    /* Premium Styling Overrides & Fallbacks (Ensures dark theme works even if cache conflicts exist) */
    :root {
      --bg-primary: #080b14;
      --bg-secondary: #0d1424;
      --bg-glass: rgba(13, 20, 36, 0.65);
      --border-color: rgba(255, 255, 255, 0.08);
      --text-primary: #f0f4ff;
      --text-secondary: #8892a4;
      --accent-indigo: #4f46e5;
      --accent-indigo-gradient: linear-gradient(135deg, #4f46e5, #7c3aed);
      --font-main: 'Work Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      --font-title: 'Manrope', sans-serif;
    }

    body {
      background-color: var(--bg-primary);
      color: var(--text-primary);
      font-family: var(--font-main);
      overflow-x: hidden;
      min-height: 100vh;
    }

    .glass-auth-card {
      background: var(--bg-glass);
      border: 1px solid var(--border-color);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 24px;
      box-shadow: 
        0 20px 50px rgba(0, 0, 0, 0.4),
        inset 0 1px 0 rgba(255, 255, 255, 0.1);
      transition: border-color 0.3s ease, box-shadow 0.3s ease;
    }

    .glass-auth-card:hover {
      border-color: rgba(79, 70, 229, 0.25);
      box-shadow: 
        0 20px 50px rgba(0, 0, 0, 0.4),
        0 0 30px rgba(79, 70, 229, 0.15),
        inset 0 1px 0 rgba(255, 255, 255, 0.15);
    }

    /* Input Styling */
    .custom-input {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: var(--text-primary);
      border-radius: 12px;
      padding: 12px 14px 12px 42px;
      width: 100%;
      outline: none;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .custom-input:focus {
      border-color: var(--accent-indigo);
      background: rgba(255, 255, 255, 0.06);
      box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.15);
    }

    /* Google Button */
    .google-btn {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: var(--text-primary);
      border-radius: 12px;
      padding: 12px 24px;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      width: 100%;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .google-btn:hover {
      background: rgba(255, 255, 255, 0.07);
      border-color: rgba(255, 255, 255, 0.16);
      transform: translateY(-1px);
    }

    .google-btn:active {
      transform: translateY(0);
    }

    /* Primary Action Buttons */
    .btn-gradient {
      background: var(--accent-indigo-gradient);
      color: #ffffff;
      border: none;
      border-radius: 12px;
      padding: 12px 24px;
      font-weight: 600;
      width: 100%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      box-shadow: 0 4px 16px rgba(79, 70, 229, 0.3);
      transition: all 0.2s ease;
    }

    .btn-gradient:hover {
      filter: brightness(1.1);
      box-shadow: 0 6px 20px rgba(79, 70, 229, 0.4);
      transform: translateY(-1px);
    }

    .btn-gradient:active {
      transform: translateY(0);
    }

    /* Messages Alert */
    .message:not(:empty) {
      padding: 12px 16px;
      margin-bottom: 20px;
      border-radius: 12px;
      font-size: 14px;
      text-align: left;
      font-weight: 500;
    }

    .message.success {
      background-color: rgba(0, 191, 165, 0.1);
      color: #00bfa5;
      border: 1px solid rgba(0, 191, 165, 0.2);
    }

    .message.error {
      background-color: rgba(239, 68, 68, 0.08);
      color: #fca5a5;
      border: 1px solid rgba(239, 68, 68, 0.18);
    }

    /* Loading Spinner */
    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid transparent;
      border-top-color: currentColor;
      border-radius: 50%;
      animation: spin-anim 0.8s linear infinite;
      display: none;
    }

    @keyframes spin-anim {
      to { transform: rotate(360deg); }
    }

    button.loading .spinner {
      display: inline-block;
    }

    /* Background Orbs */
    .bg-orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(130px);
      pointer-events: none;
      z-index: 0;
      opacity: 0.14;
    }

    .orb-purple {
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, #7c3aed, transparent);
      top: -150px;
      left: -150px;
    }

    .orb-indigo {
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, #4f46e5, transparent);
      bottom: -200px;
      right: -200px;
    }
  </style>
  
  <!-- Vercel Web Analytics -->
  <script defer src="https://cdn.vercel-insights.com/v1/script.js"></script>
  
  <!-- Vercel Speed Insights -->
  <script type="module" src="/static/js/speed-insights.js"></script>
</head>
<body class="min-h-screen flex flex-col justify-between">

  <!-- Glowing Decorative Orbs -->
  <div class="bg-orb orb-purple"></div>
  <div class="bg-orb orb-indigo"></div>

  <!-- Header Branding -->
  <header class="w-full z-10 py-6 px-gutter max-w-container-max mx-auto flex justify-between items-center">
    <a href="/app" class="flex items-center gap-2 text-decoration-none group">
      <span class="material-symbols-outlined text-[28px] text-primary transition-transform group-hover:scale-105" style="font-variation-settings: 'FILL' 1;">balance</span>
      <span class="font-title text-title-md font-bold text-on-surface">Dogovor <span class="bg-gradient-to-r from-indigo-400 to-purple-400 bg-clip-text text-transparent">AI</span></span>
    </a>
    <div>
      <a class="font-label-md text-label-md text-on-surface-variant hover:text-primary transition-colors text-decoration-none" href="mailto:support@dogovorai.xyz">Поддержка</a>
    </div>
  </header>

  <!-- Centered Login Card Container -->
  <main class="flex-grow flex items-center justify-center px-4 py-8 z-10">
    <div class="w-full max-w-[420px] glass-auth-card p-8 flex flex-col gap-6">
      
      <!-- Card Header -->
      <div class="text-center flex flex-col items-center gap-2">
        <div class="w-14 h-14 rounded-2xl bg-indigo-500/10 border border-indigo-500/20 flex items-center justify-center mb-1">
          <span class="material-symbols-outlined text-primary text-[28px]" style="font-variation-settings: 'FILL' 1;">security</span>
        </div>
        <h1 class="font-title text-2xl font-bold text-on-surface tracking-tight">С возвращением</h1>
        <p class="font-body-sm text-sm text-on-surface-variant leading-relaxed px-4">Войдите в свой личный кабинет для безопасного анализа договоров</p>
      </div>

      <!-- Global Message Container -->
      <div class="message" id="message" aria-live="polite"></div>

      <!-- Google Sign-In Button -->
      <button class="google-btn" id="googleLoginBtn" type="button">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" class="flex-shrink-0">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.27-4.74 3.27-8.1z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18A10.96 10.96 0 001 12c0 1.77.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        <span class="text-sm font-semibold button-text">Войти через Google</span>
      </button>

      <!-- Divider -->
      <div class="relative py-2 flex items-center justify-center">
        <div class="absolute inset-0 flex items-center">
          <div class="w-full border-t border-white/5"></div>
        </div>
        <span class="relative bg-[#0b101d] px-3 text-xs uppercase tracking-wider text-on-surface-variant font-semibold">или по email</span>
      </div>

      <!-- STEP 1: Email Form -->
      <form class="flex flex-col gap-4" id="loginStep1Form" autocomplete="on">
        <div class="flex flex-col gap-1.5">
          <label class="font-label-md text-xs text-on-surface-variant px-1" for="email">Электронная почта</label>
          <div class="relative flex items-center">
            <span class="material-symbols-outlined absolute left-3.5 text-outline-variant text-[20px]">mail</span>
            <input class="custom-input text-sm" id="email" name="email" placeholder="name@company.com" required="" type="email" autocomplete="email"/>
          </div>
        </div>
        
        <button class="btn-gradient" id="getOtpButton" type="submit">
          <span class="button-text">Получить код</span>
          <span class="spinner" id="otpSpinner" aria-hidden="true"></span>
          <span class="material-symbols-outlined text-[18px]">arrow_forward</span>
        </button>
      </form>

      <!-- STEP 2: Verify Code Form (Initially Hidden) -->
      <form class="flex flex-col gap-4 hidden" id="loginStep2Form" autocomplete="off">
        <div class="flex justify-between items-center px-1">
          <p class="text-xs text-on-surface-variant">Код отправлен на <span id="displayEmail" class="font-semibold text-primary"></span></p>
          <button type="button" id="changeEmailBtn" class="text-xs text-primary hover:underline font-semibold bg-transparent border-none p-0 cursor-pointer">Изменить</button>
        </div>
        
        <div class="flex flex-col gap-1.5">
          <label class="font-label-md text-xs text-on-surface-variant px-1" for="otpCode">Код подтверждения</label>
          <div class="relative flex items-center">
            <span class="material-symbols-outlined absolute left-3.5 text-outline-variant text-[20px]">dialpad</span>
            <input class="custom-input text-sm text-center tracking-widest font-bold font-title" id="otpCode" name="code" placeholder="123456" required="" type="text" inputmode="numeric" pattern="\d{6}" maxlength="6" autocomplete="one-time-code"/>
          </div>
        </div>
        
        <button class="btn-gradient" id="verifyOtpButton" type="submit">
          <span class="button-text">Войти</span>
          <span class="spinner" id="verifySpinner" aria-hidden="true"></span>
          <span class="material-symbols-outlined text-[18px]">login</span>
        </button>
      </form>

      <!-- Sign Up Link -->
      <div class="text-center mt-2 border-t border-white/5 pt-4">
        <p class="text-sm text-on-surface-variant">
          Нет аккаунта? 
          <a class="text-primary font-bold hover:underline transition-colors" href="/app/register">Зарегистрироваться</a>
        </p>
      </div>

    </div>
  </main>

  <!-- Footer -->
  <footer class="w-full py-6 mt-auto border-t border-white/5 bg-[#0b101c]/50 backdrop-blur-md">
    <div class="max-w-container-max mx-auto px-gutter flex flex-col sm:flex-row justify-between items-center gap-4 text-center sm:text-left">
      <div>
        <p class="text-xs text-on-surface-variant">© 2026 Dogovor AI. Точность в каждом пункте.</p>
      </div>
      <div class="flex gap-4">
        <a class="text-xs text-on-surface-variant hover:text-primary transition-colors text-decoration-none" href="/app/privacy">Политика конфиденциальности</a>
      </div>
    </div>
  </footer>

  <!-- Scripts -->
  <script src="/static/js/analytics_helper.js?v=1.3"></script>
  <script src="/static/js/global_actions.js?v=1.3"></script>
  <script src="/static/js/login.js?v=1.3"></script>
  <script src="/static/js/privacy.js?v=1.3"></script>
</body>
</html>

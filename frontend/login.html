<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DogovorAI — Вход</title>
  <link rel="stylesheet" href="/static/css/register.css">
  <link rel="stylesheet" href="/static/css/privacy.css">
</head>
<body>
  <main class="page-shell">
    <section class="card">
      <div class="brand">
        <span class="brand-title">DogovorAI</span>
        <p class="brand-subtitle">Вход в аккаунт</p>
        <a class="text-link" href="/app">Вернуться на главную</a>
      </div>

      <div class="message" id="message" aria-live="polite"></div>

      <!-- Google Sign-In Button -->
      <button class="button button-google" id="googleLoginBtn" type="button">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.27-4.74 3.27-8.1z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18A10.96 10.96 0 001 12c0 1.77.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        <span class="button-text">Войти через Google</span>
      </button>

      <div class="divider">или</div>

      <!-- STEP 1: Email Form -->
      <form class="form" id="loginStep1Form">
        <label class="field-label" for="email">Email</label>
        <input class="field-input" id="email" name="email" type="email" placeholder="ivan@example.com" required>

        <button class="button button-primary" id="getOtpButton" type="submit">
          <span class="button-text">Получить код</span>
          <span class="spinner" id="otpSpinner" aria-hidden="true"></span>
        </button>
      </form>

      <!-- STEP 2: Verify Code Form (Initially Hidden) -->
      <form class="form hidden" id="loginStep2Form">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 8px;">
          <p class="hint" style="margin:0;">Код отправлен на <span id="displayEmail" style="font-weight:600;"></span></p>
          <button type="button" id="changeEmailBtn" class="text-link" style="border:none; background:transparent; font-size:0.85em; padding:0; cursor:pointer;">Изменить</button>
        </div>

        <label class="field-label" for="otpCode">Отправленный код</label>
        <input class="field-input" id="otpCode" name="code" type="text" inputmode="numeric" pattern="\d{6}" placeholder="123456" maxlength="6" required>

        <button class="button button-primary" id="verifyOtpButton" type="submit">
          <span class="button-text">Войти</span>
          <span class="spinner" id="verifySpinner" aria-hidden="true"></span>
        </button>
      </form>

      <p class="form-footer">
        Нет аккаунта? <a class="text-link" href="/app/register">Зарегистрироваться</a>
      </p>
    </section>
  </main>

  <script src="/static/js/login.js"></script>
  <script src="/static/js/privacy.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DogovorAI — Вход</title>
  <link rel="stylesheet" href="/static/css/register.css">
</head>
<body>
  <main class="page-shell">
    <section class="card">
      <div class="brand">
        <span class="brand-title">DogovorAI</span>
        <p class="brand-subtitle">Вход в аккаунт</p>
        <a class="text-link" href="/app">Вернуться на главную</a>
      </div>

      <div class="message" id="message" aria-live="polite"></div>

      <form class="form" id="loginForm">
        <label class="field-label" for="email">Email</label>
        <input class="field-input" id="email" name="email" type="email" placeholder="ivan@example.com" required>

        <label class="field-label" for="password">Пароль</label>
        <input class="field-input" id="password" name="password" type="password" placeholder="Ваш пароль" required>

        <button class="button button-primary" id="loginButton" type="submit">
          <span class="button-text">Войти</span>
          <span class="spinner" id="loginSpinner" aria-hidden="true"></span>
        </button>
      </form>

      <p class="form-footer">
        Нет аккаунта? <a class="text-link" href="/app/register">Зарегистрироваться</a>
      </p>
    </section>
  </main>

  <script src="/static/js/login.js"></script>
</body>
</html>

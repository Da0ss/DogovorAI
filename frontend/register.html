<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DogovorAI — Регистрация</title>
  <link rel="stylesheet" href="/static/css/register.css">
</head>
<body>
  <main class="page-shell">
    <section class="card">
      <div class="brand">
        <span class="brand-title">DogovorAI</span>
        <p class="brand-subtitle">Регистрация и подтверждение аккаунта</p>
        <a class="text-link" href="/app">Вернуться на главную</a>
      </div>

      <div class="message" id="message" aria-live="polite"></div>

      <form class="form" id="registerForm">
        <label class="field-label" for="email">Email</label>
        <input class="field-input" id="email" name="email" type="email" placeholder="ivan@example.com" required>

        <label class="field-label" for="password">Пароль</label>
        <input class="field-input" id="password" name="password" type="password" placeholder="Минимум 6 символов" minlength="6" required>

        <button class="button button-primary" id="registerButton" type="submit">
          <span class="button-text">Зарегистрироваться</span>
          <span class="spinner" id="registerSpinner" aria-hidden="true"></span>
        </button>
      </form>

      <p class="form-footer">
        Уже есть аккаунт? <a class="text-link" href="/app/login">Войти</a>
      </p>

      <form class="form hidden" id="verifyForm">
        <p class="hint">Код подтверждения отправлен на email. Введите 6 цифр.</p>

        <label class="field-label" for="verifyCode">Код</label>
        <input class="field-input" id="verifyCode" name="code" type="text" inputmode="numeric" pattern="\d{6}" placeholder="123456" maxlength="6" required>

        <button class="button button-secondary" id="verifyButton" type="submit">
          <span class="button-text">Подтвердить</span>
          <span class="spinner" id="verifySpinner" aria-hidden="true"></span>
        </button>
      </form>
    </section>
  </main>

  <script src="/static/js/register.js"></script>
</body>
</html>

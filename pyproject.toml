[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "dogovor-ai"
version = "0.1.0"
description = "Intelligent assistant for analyzing and automating legal documents"
readme = "README.md"
requires-python = ">=3.11"
authors = [
    {name = "DogovorAI Team", email = "team@dogovor-ai.com"}
]

# ---- НАСТРОЙКА СБОРКИ ДЛЯ VERCEL / SETUPTOOLS ----
[tool.setuptools.packages.find]
include = ["app*", "config*", "alembic*"]

[tool.setuptools]
py-modules = ["main"]  # <--- ДОБАВЛЕНО: Явно включает корневой main.py в сборку

# ---------------- ДРУГИЕ ИНСТРУМЕНТЫ --------------
[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
asyncio_mode = "auto"

[tool.black]
line-length = 100
target-version = ['py311']

[tool.mypy]
python_version = "3.11"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = false
disallow_incomplete_defs = false

[tool.isort]
profile = "black"
line_length = 100
